{% load static %}

<link href="{% static 'css/password_reset.css' %}" rel="stylesheet" type="text/css">

<div class="container">
    {% block headertitle %}
        <h2>パスワードリセット（メール送信）</h2>
    {% endblock %}

    {% block content %}
        <p>パスワードリセットのメールを送信しました。<br/>
        メールに記載されているリンクからパスワードの再設定を行ってください。</p>
        <div class="form-group">
            <a class="btn btn-primary" href="{% url 'login'%}" style="width: 100%;">ログイン画面へ</a>
        </div>
    {% endblock %}
</div>
